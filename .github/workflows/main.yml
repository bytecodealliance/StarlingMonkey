name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
defaults:
  run:
    shell: bash

# Cancel any in-flight jobs for the same PR/branch so there's only one active
# at a time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    strategy:
      matrix:
        build: [release, debug]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Install Rust 1.88.0
      run: |
        rustup toolchain install 1.88.0
        rustup target add wasm32-wasip1 --toolchain 1.88.0

    - name: Cache SpiderMonkey tarball
      uses: actions/cache@v4
      id: sm-cache
      with:
        path: |
          spidermonkey-dist
        key: cache-${{ matrix.build }}-${{ hashFiles('cmake/spidermonkey.cmake') }}

    - name: Set env var to use cached SpiderMonkey tarball
      if: steps.sm-cache.outputs.cache-hit == 'true'
      run: echo "SPIDERMONKEY_BINARIES=spidermonkey-dist" >> $GITHUB_ENV

    - uses: actions/setup-node@v2
      with:
        node-version: 'lts/*'

    - name: Build StarlingMonkey Test Runtimes
      if: matrix.build != 'weval'
      run: |
        cmake -S . -B cmake-build-${{ matrix.build }} -DENABLE_WPT:BOOL=ON -DCMAKE_BUILD_TYPE=${{ matrix.build == 'release' && 'Release' || 'Debug' }}
        cmake --build cmake-build-${{ matrix.build }} --target integration-test-server
        cmake --build cmake-build-${{ matrix.build }} --target wpt-runtime

    #- name: Build StarlingMonkey WPT Weval
    #  if: matrix.build == 'weval'
    #  run: |
    #    cmake -S . -B cmake-build-weval -DCMAKE_BUILD_TYPE=Release -DUSE_WASM_OPT=OFF -DWEVAL=ON -DENABLE_WPT:BOOL=ON
    #    cmake --build cmake-build-weval --parallel 4 --target starling-ics.wevalcache
    #    cmake --build cmake-build-weval --parallel 4 --target wpt-runtime

    - name: Prepare WPT hosts
      run: |
        cat deps/wpt-hosts | sudo tee -a /etc/hosts

    - name: StarlingMonkey E2E,  Integration Tests, and WPT Tests
      env:
        CTEST_OUTPUT_ON_FAILURE: 1
      run: ctest --test-dir cmake-build-${{ matrix.build }} --verbose --no-tests=error

    - name: Show cacheable SpiderMonkey artifacts
      if: steps.sm-cache.outputs.cache-hit != 'true'
      run: |
        ls -l cmake-build-${{ matrix.build }}/spidermonkey/dist/libspidermonkey.a
        tree cmake-build-${{ matrix.build }}/spidermonkey/dist/include

    # Upload tarball as an artifact of the github action run, so the output
    # can be inspected for pull requests.
    - name: Upload SpiderMonkey tarball
      uses: actions/upload-artifact@v4
      if: github.event_name != 'push' || (github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v'))
          && steps.sm-cache.outputs.cache-hit != 'true'
      with:
        name: spidermonkey-${{ matrix.build }}
        path: |
          cmake-build-${{ matrix.build }}/spidermonkey/dist/libspidermonkey.a
          cmake-build-${{ matrix.build }}/spidermonkey/dist/include
